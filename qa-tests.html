<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAC Board - QA Test Suite</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  padding: 20px;
}

h1 {
  font-size: 24px;
  color: #7C74FF;
  margin-bottom: 4px;
}

.subtitle {
  color: #888;
  font-size: 14px;
  margin-bottom: 20px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: transform 0.1s;
}

button:active { transform: scale(0.97); }

#btn-run-all {
  background: #7C74FF;
  color: white;
}

#btn-run-failed {
  background: #D32F2F;
  color: white;
}

#btn-reset {
  background: #444;
  color: #ccc;
}

.filter-btns {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

.filter-btns button {
  padding: 6px 12px;
  font-size: 12px;
  background: #2a2a4a;
  color: #aaa;
  border: 1px solid #444;
}

.filter-btns button.active {
  background: #7C74FF;
  color: white;
  border-color: #7C74FF;
}

/* Summary bar */
.summary {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  padding: 16px;
  background: #16213e;
  border-radius: 12px;
  border: 1px solid #333;
}

.summary-item {
  text-align: center;
}

.summary-item .count {
  font-size: 32px;
  font-weight: 800;
  line-height: 1;
}

.summary-item .label {
  font-size: 11px;
  text-transform: uppercase;
  color: #888;
  margin-top: 4px;
}

.count-total { color: #7C74FF; }
.count-pass { color: #43A047; }
.count-fail { color: #D32F2F; }
.count-skip { color: #FB8C00; }

.progress-bar {
  height: 6px;
  background: #333;
  border-radius: 3px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #7C74FF;
  border-radius: 3px;
  transition: width 0.3s;
  width: 0%;
}

/* Test sections */
.test-section {
  margin-bottom: 16px;
  background: #16213e;
  border-radius: 12px;
  border: 1px solid #333;
  overflow: hidden;
}

.section-header {
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}

.section-header:hover { background: rgba(124, 116, 255, 0.05); }

.section-toggle {
  font-size: 12px;
  color: #666;
  transition: transform 0.2s;
}

.section-header.open .section-toggle { transform: rotate(90deg); }

.section-title {
  font-size: 15px;
  font-weight: 700;
  flex: 1;
}

.section-badge {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}

.badge-pending { background: #333; color: #888; }
.badge-running { background: #1a237e; color: #7C74FF; }
.badge-pass { background: #1b5e20; color: #81C784; }
.badge-fail { background: #b71c1c; color: #EF9A9A; }
.badge-mixed { background: #e65100; color: #FFCC80; }

.section-body {
  display: none;
  border-top: 1px solid #333;
}

.section-header.open + .section-body { display: block; }

/* Individual tests */
.test-row {
  padding: 8px 16px 8px 42px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  border-bottom: 1px solid #222;
}

.test-row:last-child { border-bottom: none; }

.test-icon {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}

.icon-pending { background: #333; color: #666; }
.icon-pass { background: #1b5e20; color: #81C784; }
.icon-fail { background: #b71c1c; color: #EF9A9A; }
.icon-skip { background: #e65100; color: #FFCC80; }
.icon-running { background: #1a237e; color: #7C74FF; }

.test-name { flex: 1; }
.test-time { color: #666; font-size: 11px; }

.test-error {
  padding: 6px 16px 8px 68px;
  font-size: 12px;
  color: #EF9A9A;
  background: rgba(183, 28, 28, 0.1);
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-all;
}

/* Hidden app iframe */
#app-frame {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 375px;
  height: 667px;
  border: 2px solid #7C74FF;
  border-radius: 8px;
  z-index: 1000;
  opacity: 0.3;
  transition: opacity 0.2s;
}

#app-frame:hover { opacity: 1; }

.frame-toggle {
  position: fixed;
  bottom: 680px;
  right: 0;
  background: #7C74FF;
  color: white;
  border: none;
  padding: 4px 12px;
  border-radius: 8px 8px 0 0;
  font-size: 11px;
  cursor: pointer;
  z-index: 1001;
}

@media (max-width: 768px) {
  #app-frame { display: none; }
  .frame-toggle { display: none; }
}
</style>
</head>
<body>

<h1>AAC Board - QA Test Suite</h1>
<p class="subtitle">Comprehensive quality assurance for pre-launch validation</p>

<div class="controls">
  <button id="btn-run-all">Run All Tests</button>
  <button id="btn-run-failed">Re-run Failed</button>
  <button id="btn-reset">Reset</button>
  <div class="filter-btns">
    <button class="active" data-filter="all">All</button>
    <button data-filter="fail">Failed</button>
    <button data-filter="skip">Skipped</button>
  </div>
</div>

<div class="summary">
  <div class="summary-item"><div class="count count-total" id="count-total">0</div><div class="label">Total</div></div>
  <div class="summary-item"><div class="count count-pass" id="count-pass">0</div><div class="label">Passed</div></div>
  <div class="summary-item"><div class="count count-fail" id="count-fail">0</div><div class="label">Failed</div></div>
  <div class="summary-item"><div class="count count-skip" id="count-skip">0</div><div class="label">Skipped</div></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div id="test-results"></div>

<button class="frame-toggle" id="frame-toggle">Toggle App Preview</button>
<iframe id="app-frame" src="index.html"></iframe>

<script>
// ── Test Framework ──
const tests = [];
let results = {};
let running = false;

function describe(sectionName, fn) {
  const section = { name: sectionName, tests: [] };
  const it = (testName, testFn) => {
    section.tests.push({ name: testName, fn: testFn });
  };
  fn(it);
  tests.push(section);
}

function assert(condition, message) {
  if (!condition) throw new Error(message || 'Assertion failed');
}

function assertEqual(actual, expected, message) {
  if (actual !== expected) {
    throw new Error(message || `Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
  }
}

function assertIncludes(arr, item, message) {
  if (!arr.includes(item)) {
    throw new Error(message || `Expected array to include ${JSON.stringify(item)}`);
  }
}

function assertGreaterThan(a, b, message) {
  if (!(a > b)) throw new Error(message || `Expected ${a} > ${b}`);
}

function assertExists(el, message) {
  if (!el) throw new Error(message || 'Element does not exist');
}

// Get the app window from iframe
function getApp() {
  const frame = document.getElementById('app-frame');
  return frame.contentWindow;
}

function getDoc() {
  return getApp().document;
}

// Wait for a condition with timeout
function waitFor(conditionFn, timeout = 2000) {
  return new Promise((resolve, reject) => {
    const start = Date.now();
    const check = () => {
      try {
        if (conditionFn()) { resolve(); return; }
      } catch(e) { /* not ready yet */ }
      if (Date.now() - start > timeout) {
        reject(new Error('Timed out waiting for condition'));
        return;
      }
      requestAnimationFrame(check);
    };
    check();
  });
}

// Small delay helper
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ════════════════════════════════════════
// TEST DEFINITIONS
// ════════════════════════════════════════

// ── A.1: Core Communication ──
describe('A.1 Core Communication', (it) => {
  it('Core word strip renders buttons', () => {
    const strip = getDoc().getElementById('core-word-strip');
    assertExists(strip, 'Core word strip not found');
    const btns = strip.querySelectorAll('.core-strip-btn');
    assertGreaterThan(btns.length, 0, 'No core strip buttons rendered');
  });

  it('Core words include essential words (I, want, help, more)', () => {
    const strip = getDoc().getElementById('core-word-strip');
    const labels = Array.from(strip.querySelectorAll('.core-strip-btn'))
      .map(b => b.getAttribute('data-id'));
    assertIncludes(labels, 'core-i', 'Missing core word: I');
    assertIncludes(labels, 'core-want', 'Missing core word: want');
    assertIncludes(labels, 'core-help', 'Missing core word: help');
    assertIncludes(labels, 'core-more', 'Missing core word: more');
  });

  it('Tapping a core word adds it to message bar', async () => {
    const app = getApp();
    // Clear message first
    app.messageWords = [];
    app.messageButtonIds = [];
    app.renderMessage();

    app.addWordToMessage('want', 'core-want');
    const container = getDoc().getElementById('message-words');
    const chips = container.querySelectorAll('.word-chip');
    assertEqual(chips.length, 1, 'Expected 1 word chip');
    assertEqual(chips[0].textContent, 'want', 'Word chip text should be "want"');
  });

  it('Multiple words build a sentence in order', () => {
    const app = getApp();
    app.messageWords = [];
    app.messageButtonIds = [];
    app.renderMessage();

    app.addWordToMessage('I', 'core-i');
    app.addWordToMessage('want', 'core-want');
    app.addWordToMessage('help', 'core-help');

    const chips = getDoc().getElementById('message-words').querySelectorAll('.word-chip');
    assertEqual(chips.length, 3, 'Expected 3 word chips');
    assertEqual(chips[0].textContent, 'I');
    assertEqual(chips[1].textContent, 'want');
    assertEqual(chips[2].textContent, 'help');
  });

  it('Clear button empties message bar', () => {
    const app = getApp();
    app.addWordToMessage('test', null);
    getDoc().getElementById('btn-clear').click();
    await delay(50);
    const chips = getDoc().getElementById('message-words').querySelectorAll('.word-chip');
    assertEqual(chips.length, 0, 'Message bar should be empty after clear');
  });

  it('Backspace removes last word', () => {
    const app = getApp();
    app.messageWords = [];
    app.messageButtonIds = [];
    app.addWordToMessage('I', 'core-i');
    app.addWordToMessage('want', 'core-want');
    getDoc().getElementById('btn-backspace').click();
    assertEqual(app.messageWords.length, 1, 'Should have 1 word after backspace');
    assertEqual(app.messageWords[0], 'I', 'Remaining word should be "I"');
  });

  it('Grid container exists and has cells', () => {
    const grid = getDoc().getElementById('grid');
    assertExists(grid, 'Grid container not found');
    const cells = grid.querySelectorAll('.cell');
    assertGreaterThan(cells.length, 0, 'Grid should have cells');
  });

  it('Folder cells have folder-btn class and data-folder', () => {
    const app = getApp();
    app.currentFolder = null;
    app.renderGrid();
    const folders = getDoc().querySelectorAll('#grid .cell.folder-btn');
    assertGreaterThan(folders.length, 0, 'Home grid should show folder buttons');
    const first = folders[0];
    assert(first.hasAttribute('data-folder'), 'Folder button missing data-folder attribute');
  });

  it('Clicking a folder opens it (sets currentFolder)', () => {
    const app = getApp();
    app.currentFolder = null;
    app.renderGrid();
    const folders = getDoc().querySelectorAll('#grid .cell.folder-btn');
    assert(folders.length > 0, 'No folders to click');
    folders[0].click();
    assert(app.currentFolder !== null, 'currentFolder should be set after clicking folder');
  });

  it('Back button appears inside a folder', () => {
    const app = getApp();
    // Should already be in a folder from previous test
    if (app.currentFolder === null) {
      app.currentFolder = 'food';
      app.renderGrid();
    }
    const backBtn = getDoc().getElementById('btn-back-nav');
    assert(backBtn.style.display !== 'none', 'Back button should be visible in folder view');
  });

  it('Back button returns to home grid', () => {
    const app = getApp();
    if (app.currentFolder === null) {
      app.currentFolder = 'food';
      app.renderGrid();
    }
    getDoc().getElementById('btn-back-nav').click();
    assertEqual(app.currentFolder, null, 'currentFolder should be null after back');
  });

  it('Speech API is available', () => {
    assert('speechSynthesis' in getApp(), 'Web Speech API not available');
  });
});

// ── A.2: Grid Templates ──
describe('A.2 Grid Templates', (it) => {
  it('getGridSize returns valid size', () => {
    const size = getApp().getGridSize();
    assert([3, 4, 5, 6].includes(size), `Invalid grid size: ${size}`);
  });

  it('setGridSize(3) applies grid-3 class', () => {
    const app = getApp();
    app.setGridSize(3);
    assert(getDoc().body.classList.contains('grid-3'), 'Body should have grid-3 class');
  });

  it('setGridSize(4) applies grid-4 class', () => {
    const app = getApp();
    app.setGridSize(4);
    assert(getDoc().body.classList.contains('grid-4'), 'Body should have grid-4 class');
  });

  it('setGridSize(6) applies grid-6 class', () => {
    const app = getApp();
    app.setGridSize(6);
    assert(getDoc().body.classList.contains('grid-6'), 'Body should have grid-6 class');
    // Reset to default
    app.setGridSize(4);
  });

  it('Grid size persists in localStorage', () => {
    const app = getApp();
    app.setGridSize(3);
    assertEqual(app.localStorage.getItem('aac-grid-size'), '3', 'Grid size not saved');
    app.setGridSize(4);
  });

  it('Core word strip visible in all grid sizes', () => {
    const app = getApp();
    for (const size of [3, 4, 6]) {
      app.setGridSize(size);
      const strip = getDoc().getElementById('core-word-strip');
      const style = getApp().getComputedStyle(strip);
      assert(style.display !== 'none', `Core strip hidden at grid size ${size}`);
    }
    app.setGridSize(4);
  });
});

// ── A.3: Parent Mode ──
describe('A.3 Parent Mode', (it) => {
  it('Parent mode starts disabled', () => {
    const app = getApp();
    app.setParentMode(false);
    assertEqual(app.parentMode, false, 'Parent mode should be disabled');
  });

  it('setParentMode(true) enables parent mode', () => {
    const app = getApp();
    app.setParentMode(true);
    assertEqual(app.parentMode, true, 'parentMode should be true');
    assert(getDoc().body.classList.contains('parent-mode'), 'Body missing parent-mode class');
    assert(getDoc().getElementById('app-header').classList.contains('parent-active'),
      'Header missing parent-active class');
  });

  it('setParentMode(false) disables parent mode', () => {
    const app = getApp();
    app.setParentMode(false);
    assertEqual(app.parentMode, false, 'parentMode should be false');
    assert(!getDoc().body.classList.contains('parent-mode'), 'Body still has parent-mode class');
  });

  it('Settings overlay opens only in parent mode context', () => {
    const app = getApp();
    app.setParentMode(true);
    getDoc().getElementById('btn-parent-settings').click();
    const overlay = getDoc().getElementById('settings-overlay');
    assert(overlay.classList.contains('open'), 'Settings overlay should open');
    // Clean up
    overlay.classList.remove('open');
    app.setParentMode(false);
  });

  it('Toggle button text updates with mode', () => {
    const app = getApp();
    const btn = getDoc().getElementById('btn-toggle-parent-mode');
    app.setParentMode(true);
    assert(btn.textContent.includes('Disable'), 'Should say Disable when on');
    app.setParentMode(false);
    assert(btn.textContent.includes('Enable'), 'Should say Enable when off');
  });

  it('Auto-lock timer is set when enabled', () => {
    const app = getApp();
    app.setParentMode(true);
    assert(app.parentAutoLockTimer !== null, 'Auto-lock timer should be set');
    app.setParentMode(false);
  });
});

// ── A.4: View Switching ──
describe('A.4 View Switching (Tabs)', (it) => {
  it('Talk tab is active by default', () => {
    const tab = getDoc().getElementById('tab-talk');
    assert(tab.classList.contains('active'), 'Talk tab should be active');
  });

  it('Switch to Schedule tab', () => {
    const app = getApp();
    app.switchTab('tab-schedule');
    assert(getDoc().getElementById('tab-schedule').classList.contains('active'),
      'Schedule tab should be active');
    assert(getDoc().getElementById('view-schedule').classList.contains('active'),
      'Schedule view should be active');
  });

  it('Switch to Rewards tab', () => {
    const app = getApp();
    app.switchTab('tab-rewards');
    assert(getDoc().getElementById('tab-rewards').classList.contains('active'),
      'Rewards tab should be active');
    assert(getDoc().getElementById('view-rewards').classList.contains('active'),
      'Rewards view should be active');
  });

  it('Switch back to Talk tab', () => {
    const app = getApp();
    app.switchTab('tab-talk');
    assert(getDoc().getElementById('tab-talk').classList.contains('active'),
      'Talk tab should be active again');
    assertEqual(app.activeTab, 'talk', 'activeTab should be "talk"');
  });

  it('Header title updates with tab', () => {
    const app = getApp();
    app.switchTab('tab-schedule');
    const title = getDoc().getElementById('app-header-title').textContent;
    assert(title.length > 0, 'Header title should not be empty');
    app.switchTab('tab-talk');
  });

  it('Back button hidden on non-Talk tabs', () => {
    const app = getApp();
    app.switchTab('tab-rewards');
    const backBtn = getDoc().getElementById('btn-back-nav');
    assertEqual(backBtn.style.display, 'none', 'Back button should be hidden on Rewards');
    app.switchTab('tab-talk');
  });

  it('Only one tab active at a time', () => {
    const app = getApp();
    app.switchTab('tab-schedule');
    const activeTabs = getDoc().querySelectorAll('.tab-btn.active');
    assertEqual(activeTabs.length, 1, 'Only one tab should be active');
    app.switchTab('tab-talk');
  });
});

// ── A.5: Activity System ──
describe('A.5 Activity Overlays', (it) => {
  it('getAllActivities returns activities', () => {
    const activities = getApp().getAllActivities();
    assertGreaterThan(activities.length, 0, 'Should have at least one activity');
  });

  it('Default activities include mealtime', () => {
    const activities = getApp().getAllActivities();
    const mealtime = activities.find(a => a.id === 'mealtime');
    assertExists(mealtime, 'Mealtime activity not found');
    assert(mealtime.words.length > 0, 'Mealtime should have words');
  });

  it('startActivity sets activeActivity and activity-mode', () => {
    const app = getApp();
    app.startActivity('mealtime');
    assertExists(app.activeActivity, 'activeActivity should be set');
    assertEqual(app.activeActivity.id, 'mealtime');
    assert(getDoc().body.classList.contains('activity-mode'), 'Body should have activity-mode');
  });

  it('Activity banner shows when active', () => {
    const banner = getDoc().getElementById('activity-banner');
    assert(banner.classList.contains('active'), 'Activity banner should be active');
  });

  it('Grid shows activity words during activity', () => {
    const cells = getDoc().querySelectorAll('#grid .cell');
    assertGreaterThan(cells.length, 0, 'Grid should have cells during activity');
  });

  it('endActivity clears activeActivity', () => {
    const app = getApp();
    app.endActivity();
    assertEqual(app.activeActivity, null, 'activeActivity should be null');
    assert(!getDoc().body.classList.contains('activity-mode'), 'activity-mode should be removed');
  });

  it('Activity banner hidden after ending', () => {
    const banner = getDoc().getElementById('activity-banner');
    assert(!banner.classList.contains('active'), 'Banner should not be active');
  });
});

// ── A.6: Sensory Preferences ──
describe('A.6 Sensory Preferences', (it) => {
  it('Reduced motion setting exists in localStorage', () => {
    const app = getApp();
    const val = app.localStorage.getItem('aac-sensory-reduced-motion');
    assert(val === '0' || val === '1' || val === null, 'Invalid reduced motion value');
  });

  it('High contrast setting exists in localStorage', () => {
    const app = getApp();
    const val = app.localStorage.getItem('aac-sensory-high-contrast');
    assert(val === '0' || val === '1' || val === null, 'Invalid high contrast value');
  });

  it('Quiet mode setting exists in localStorage', () => {
    const app = getApp();
    const val = app.localStorage.getItem('aac-sensory-quiet');
    assert(val === '0' || val === '1' || val === null, 'Invalid quiet mode value');
  });
});

// ── A.7: Language Support ──
describe('A.7 Language Support', (it) => {
  it('Default language is "en"', () => {
    const app = getApp();
    assert(app.currentLang === 'en' || app.currentLang === 'es' || app.currentLang === 'both',
      `Unexpected language: ${app.currentLang}`);
  });

  it('setLanguage changes currentLang', () => {
    const app = getApp();
    const orig = app.currentLang;
    app.setLanguage('es');
    assertEqual(app.currentLang, 'es', 'Language should be "es"');
    app.setLanguage('both');
    assertEqual(app.currentLang, 'both', 'Language should be "both"');
    // Reset
    app.setLanguage(orig);
  });

  it('Language persists in localStorage', () => {
    const app = getApp();
    const orig = app.currentLang;
    app.setLanguage('es');
    assertEqual(app.localStorage.getItem('aac-language'), 'es');
    app.setLanguage(orig);
  });
});

// ── A.8: Usage Tracking ──
describe('A.8 Usage & Analytics', (it) => {
  it('recordUsageEvent adds to usageLog', () => {
    const app = getApp();
    const countBefore = app.usageLog.length;
    app.recordUsageEvent('core-want', 'independent');
    assertGreaterThan(app.usageLog.length, countBefore, 'usageLog should grow');
  });

  it('getTodayCount returns a number', () => {
    const count = getApp().getTodayCount();
    assert(typeof count === 'number', 'getTodayCount should return number');
  });

  it('getStreak returns a number', () => {
    const streak = getApp().getStreak();
    assert(typeof streak === 'number', 'getStreak should return number');
  });

  it('getWordFrequencies returns array', () => {
    const freqs = getApp().getWordFrequencies();
    assert(Array.isArray(freqs), 'getWordFrequencies should return array');
  });

  it('clearUsageData resets everything', () => {
    const app = getApp();
    app.clearUsageData();
    assertEqual(app.usageLog.length, 0, 'usageLog should be empty');
    assertEqual(app.usageSummary.totalCount, 0, 'totalCount should be 0');
  });
});

// ── A.9: Search ──
describe('A.9 Word Search', (it) => {
  it('Search overlay exists', () => {
    const overlay = getDoc().getElementById('search-overlay');
    assertExists(overlay, 'Search overlay not found');
  });

  it('Search input exists', () => {
    const input = getDoc().getElementById('search-input');
    assertExists(input, 'Search input not found');
  });

  it('Search button exists and is clickable', () => {
    const btn = getDoc().getElementById('btn-search');
    assertExists(btn, 'Search button not found');
  });
});

// ── A.10: Data Structures ──
describe('A.10 Data Integrity', (it) => {

function renderTestUI() {
  const container = document.getElementById('test-results');
  container.innerHTML = '';

  for (const section of tests) {
    const sectionEl = document.createElement('div');
    sectionEl.className = 'test-section';
    sectionEl.setAttribute('data-section', section.name);

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <span class="section-toggle">&#9654;</span>
      <span class="section-title">${section.name}</span>
      <span class="section-badge badge-pending">${section.tests.length} tests</span>
    `;
    header.addEventListener('click', () => {
      header.classList.toggle('open');
    });

    const body = document.createElement('div');
    body.className = 'section-body';

    for (const test of section.tests) {
      const row = document.createElement('div');
      row.className = 'test-row';
      row.setAttribute('data-test', `${section.name}::${test.name}`);
      row.innerHTML = `
        <span class="test-icon icon-pending">-</span>
        <span class="test-name">${test.name}</span>
        <span class="test-time"></span>
      `;
      body.appendChild(row);
    }

    sectionEl.appendChild(header);
    sectionEl.appendChild(body);
    container.appendChild(sectionEl);
  }
}

function updateTestRow(sectionName, testName, status, time, error) {
  const key = `${sectionName}::${testName}`;
  const row = document.querySelector(`[data-test="${CSS.escape(key)}"]`);
  if (!row) return;

  const icon = row.querySelector('.test-icon');
  const timeEl = row.querySelector('.test-time');

  icon.className = `test-icon icon-${status}`;
  icon.textContent = status === 'pass' ? '✓' : status === 'fail' ? '✗' : status === 'skip' ? '!' : '…';
  if (time !== undefined) timeEl.textContent = `${time}ms`;

  // Remove old error
  const oldError = row.nextElementSibling;
  if (oldError && oldError.classList.contains('test-error')) oldError.remove();

  // Add error message
  if (error) {
    const errEl = document.createElement('div');
    errEl.className = 'test-error';
    errEl.textContent = error;
    row.after(errEl);
  }
}

function updateSectionBadge(sectionName) {
  const sectionEl = document.querySelector(`[data-section="${CSS.escape(sectionName)}"]`);
  if (!sectionEl) return;

  const badge = sectionEl.querySelector('.section-badge');
  const sectionResults = Object.entries(results)
    .filter(([k]) => k.startsWith(sectionName + '::'));

  const passed = sectionResults.filter(([, r]) => r === 'pass').length;
  const failed = sectionResults.filter(([, r]) => r === 'fail').length;
  const total = sectionResults.length;

  if (failed > 0) {
    badge.className = 'section-badge badge-fail';
    badge.textContent = `${failed} failed`;
    // Auto-expand failed sections
    sectionEl.querySelector('.section-header').classList.add('open');
  } else if (passed === total && total > 0) {
    badge.className = 'section-badge badge-pass';
    badge.textContent = `${passed}/${total} passed`;
  } else {
    badge.className = 'section-badge badge-running';
    badge.textContent = `${passed}/${total}`;
  }
}

function updateSummary() {
  const total = Object.keys(results).length;
  const passed = Object.values(results).filter(r => r === 'pass').length;
  const failed = Object.values(results).filter(r => r === 'fail').length;
  const skipped = Object.values(results).filter(r => r === 'skip').length;

  document.getElementById('count-total').textContent = total;
  document.getElementById('count-pass').textContent = passed;
  document.getElementById('count-fail').textContent = failed;
  document.getElementById('count-skip').textContent = skipped;

  const totalTests = tests.reduce((s, sec) => s + sec.tests.length, 0);
  const pct = totalTests > 0 ? (total / totalTests * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

async function runTests(filter) {
  if (running) return;
  running = true;

  for (const section of tests) {
    for (const test of section.tests) {
      const key = `${section.name}::${test.name}`;

      // Skip if filtering and this test doesn't match
      if (filter === 'failed' && results[key] !== 'fail') continue;

      updateTestRow(section.name, test.name, 'running');

      const start = performance.now();
      try {
        const result = test.fn();
        // Handle async tests
        if (result && typeof result.then === 'function') {
          await result;
        }
        const elapsed = Math.round(performance.now() - start);
        results[key] = 'pass';
        updateTestRow(section.name, test.name, 'pass', elapsed);
      } catch (err) {
        const elapsed = Math.round(performance.now() - start);
        results[key] = 'fail';
        updateTestRow(section.name, test.name, 'fail', elapsed, err.message);
      }

      updateSectionBadge(section.name);
      updateSummary();

      // Small delay between tests to let DOM settle
      await delay(10);
    }
  }

  running = false;
}

// ── Event Handlers ──
document.getElementById('btn-run-all').addEventListener('click', () => {
  results = {};
  renderTestUI();
  // Wait for iframe to be fully loaded
  const frame = document.getElementById('app-frame');
  if (frame.contentDocument.readyState === 'complete') {
    runTests('all');
  } else {
    frame.onload = () => runTests('all');
  }
});

document.getElementById('btn-run-failed').addEventListener('click', () => {
  runTests('failed');
});

document.getElementById('btn-reset').addEventListener('click', () => {
  results = {};
  renderTestUI();
  updateSummary();
});

// Filter buttons
document.querySelectorAll('.filter-btns button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.getAttribute('data-filter');

    document.querySelectorAll('.test-section').forEach(sec => {
      const rows = sec.querySelectorAll('.test-row');
      let anyVisible = false;
      rows.forEach(row => {
        const key = row.getAttribute('data-test');
        const status = results[key];
        const show = filter === 'all' ||
          (filter === 'fail' && status === 'fail') ||
          (filter === 'skip' && status === 'skip');
        row.style.display = show ? 'flex' : 'none';
        const errEl = row.nextElementSibling;
        if (errEl && errEl.classList.contains('test-error')) {
          errEl.style.display = show ? 'block' : 'none';
        }
        if (show) anyVisible = true;
      });
      sec.style.display = anyVisible || filter === 'all' ? 'block' : 'none';
    });
  });
});

// Frame toggle
document.getElementById('frame-toggle').addEventListener('click', () => {
  const frame = document.getElementById('app-frame');
  frame.style.display = frame.style.display === 'none' ? 'block' : 'none';
});

// Initialize UI
renderTestUI();
updateSummary();
</script>

</body>
</html>
