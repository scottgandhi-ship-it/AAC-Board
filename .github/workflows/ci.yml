name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for console.log
        run: bash .scripts/check-console-logs.sh

      - name: Validate JS syntax
        run: bash .scripts/check-html-syntax.sh

      - name: HTML validation
        run: npx html-validate index.html

      - name: Verify www/ sync
        run: |
          mkdir -p www && cp index.html manifest.json www/
          diff -q index.html www/index.html
          diff -q manifest.json www/manifest.json
          echo "www/ sync check passed"
